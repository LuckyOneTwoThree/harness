name: "Harness AI Code Gate"

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  # ---------- 代码质量门控 ----------
  quality:
    name: 🔍 代码质量
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Python ---
      - name: Set up Python
        if: hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Python - Lint & Format
        if: hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        run: |
          pip install ruff black mypy
          ruff check .                    # lint 错误必须阻断
          black --check .                 # 格式错误必须阻断
          mypy . --ignore-missing-imports # 类型检查阻断（新项目可改为 || true）

      # --- Node.js ---
      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        if: hashFiles('package.json') != ''
        run: npm install -g pnpm

      - name: Node.js - Lint & Type Check
        if: hashFiles('package.json') != ''
        run: |
          pnpm install --frozen-lockfile
          pnpm lint                       # lint 错误必须阻断
          pnpm typecheck                  # 类型检查阻断（新项目可改为 || true）

      # --- Go ---
      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Go - Lint
        if: hashFiles('go.mod') != ''
        uses: golangci/golangci-lint-action@v4

  # ---------- 安全门控 ----------
  security:
    name: 🔒 安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Harness Security Check
        run: bash .harness/scripts/security-check.sh  # 安全检查必须阻断

      - name: Python - 依赖安全
        if: hashFiles('pyproject.toml', 'requirements.txt') != ''
        run: |
          pip install pip-audit
          pip-audit || true  # 依赖审计允许警告（网络问题/非关键 CVE 不阻断）

      - name: Node.js - 依赖安全
        if: hashFiles('package-lock.json', 'pnpm-lock.yaml') != ''
        run: |
          npm install -g pnpm
          pnpm audit || true  # 同上

  # ---------- 测试门控 ----------
  test:
    name: 🧪 测试
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Python - 测试
        if: hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=term-missing --cov-fail-under=70  # 测试失败必须阻断

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        if: hashFiles('package.json') != ''
        run: npm install -g pnpm

      - name: Node.js - 测试
        if: hashFiles('package.json') != ''
        run: |
          pnpm install --frozen-lockfile
          pnpm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'  # 测试失败必须阻断

      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Go - 测试
        if: hashFiles('go.mod') != ''
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1

      - name: Check Verification Protocol
        run: |
          if [ -f ".harness/features.json" ]; then
            python3 -c "
          import json, sys
          with open('.harness/features.json') as f:
              data = json.load(f)
          done = [f for f in data.get('features', []) if f.get('status') == 'done']
          no_test = [f for f in done if not f.get('tests', {}).get('unit')]
          if no_test:
              print(f'⚠️  以下功能标记 done 但无单元测试: {[f[\"name\"] for f in no_test]}')
              sys.exit(1)
          " || true
          fi

  # ---------- 飞书通知 ----------
  notify:
    name: 📢 飞书通知
    runs-on: ubuntu-latest
    needs: [quality, security, test]
    if: always()
    steps:
      - name: 发送飞书通知
        if: env.FEISHU_WEBHOOK_URL != ''
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          STATUS="✅ 通过"
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            STATUS="❌ 失败"
          fi

          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": { \"tag\": \"plain_text\", \"content\": \"CI 门控: $STATUS\" }
                },
                \"elements\": [
                  {
                    \"tag\": \"div\",
                    \"text\": {
                      \"tag\": \"lark_md\",
                      \"content\": \"**分支:** ${{ github.head_ref || github.ref_name }}\n**提交:** ${{ github.event.head_commit.message || github.event.pull_request.title }}\n**触发者:** ${{ github.actor }}\n\n**质量:** ${{ needs.quality.result }} | **安全:** ${{ needs.security.result }} | **测试:** ${{ needs.test.result }}\"
                    }
                  }
                ]
              }
            }"
